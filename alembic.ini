# Alembic configuration for quantitative_trad
# https://alembic.sqlalchemy.org/

[alembic]
# Migration script directory (relative to this file)
script_location = alembic

# Database URL is read dynamically by env.py from quant_system config, leave empty here
# sqlalchemy.url = driver://user:pass@localhost/dbname

# Migration script filename template
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Each migration runs in its own transaction
transaction_per_migration = true

# Output SQL to stdout (for debugging)
# output_encoding = utf-8

[post_write_hooks]
# Optional: auto-format migration scripts after generation
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
